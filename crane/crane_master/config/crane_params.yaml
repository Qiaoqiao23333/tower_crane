# =============================================================================
# Crane Master Parameters Configuration
# =============================================================================
# This file contains all configurable parameters for the crane CANopen nodes.
# Parameters are organized into:
#   - common:   shared defaults for all nodes
#   - hoist:    node 1 hoist overrides
#   - trolley:  node 2 trolley overrides
#   - slewing:  node 3 slewing overrides
# Per-node values override common values when both are specified.
# =============================================================================

common:
  can_interface_name: "can0"
  auto_start: true
  target_units_per_rev: 10000
  cycle_period_us: 1000           # Communication cycle period (microseconds)
  profile_velocity: 3.0          # Default profile velocity (deg/s)
  profile_acceleration: 1.0      # Default profile acceleration (deg/s²)
  profile_deceleration: 1.0      # Default profile deceleration (deg/s²)
  homing_method: 35              # CiA402 HM: 35=current position as home, 32/33/34=search index pulse
  homing_fast_velocity: 10.0     # 0x6099:01 high speed for switch/index search (deg/s)
  homing_slow_velocity: 2.0      # 0x6099:02 low speed for zero capture (deg/s)
  homing_acceleration: 10.0      # 0x609A homing acceleration (deg/s²)
  homing_timeout_s: 30.0
  homing_store_parameters: false  # DSY-C drive does not support 0x1010 (returns 0x06020000), disable to suppress the SDO abort error
  homing_restore_previous_mode: true

slewing:
  node_id: 3
  gear_ratio: 0.007143      ## 1/(20*7) (Gearbox*biggear)


trolley:
  node_id: 2
  gear_ratio: 0.1        #### 1/(10) (pulleyratio)
  profile_velocity: 90.0
  profile_acceleration: 30.0      # Default profile acceleration (deg/s²)
  profile_deceleration: 30.0
  homing_method: 35               # Absolute encoder trolley: safest default is zeroing from known current position

hoist:
  node_id: 1
  gear_ratio: 0.025       #### 1/(10*4) (Gearbox*biggear)
  profile_velocity: 120.0
  profile_acceleration: 30.0      # Default profile acceleration (deg/s²)
  profile_deceleration: 30.0
  homing_method: 35               # Absolute encoder hoist: avoid unnecessary travel unless a hard reference is required




