# =============================================================================
# 🏗️ Tower Crane CANopen ROS2 - Node Parameters
# =============================================================================
# This file defines all tunable parameters for each crane joint node.
# Edit this file to change parameters without recompiling or using ros2 param.
#
# Parameters can also be changed at runtime via:
#   ros2 param set /<namespace>/<node_name> <param> <value>
#
# Node mapping:
#   Node 1 → /hoist/canopen_ros2_node1     (Hoist   joint, hoists the load up/down)
#   Node 2 → /trolley/canopen_ros2_node2   (Trolley joint, moves load in/out)
#   Node 3 → /slewing/canopen_ros2_node3   (Slewing joint, rotates the jib)
# =============================================================================

# ---------------------------------------------------------------------------
# 🪝 Node 1 – Hoist joint
# ---------------------------------------------------------------------------
/hoist/canopen_ros2_node1:
  ros__parameters:
    can_interface: "can0"
    node_id: "1"    # 🆔 CANopen node ID on the bus (must match bus.yml / drive DIP-switch)
    gear_ratio_numerator: 10000    # ⚙️ 0x6091 sub1: Gear Ratio Numerator (Motor shaft revolutions)
    gear_ratio_denominator: 1  # ⚙️ 0x6091 sub2: Gear Ratio Denominator (Driving shaft revolutions)
    max_profile_velocity: 40.0    # 📌 0x607F: Max profile velocity limit [r/s] (output shaft revolutions/s)
    profile_velocity: 30.0    # 🏃 Default profile velocity   [r/s] (output shaft revolutions/s)
    profile_acceleration: 30.0    # ⬆️ Default profile acceleration [r/s²] (output shaft revolutions/s²)
    profile_deceleration: 300.0    # ⬇️ Default profile deceleration [r/s²] (output shaft revolutions/s²)
    quick_stop_deceleration: 100.0    # 🛑 0x6085: Quick stop deceleration [r/s²] (output shaft revolutions/s²)
    position_range_limit_max: 2147483647    # 📐 0x607B sub1: Maximum position range limit [r] (int32)
    position_range_limit_min: -2147483648    # 📐 0x607B sub2: Minimum position range limit [r] (int32)

# ---------------------------------------------------------------------------
# 🚃 Node 2 – Trolley joint
# ---------------------------------------------------------------------------
/trolley/canopen_ros2_node2:
  ros__parameters:
    can_interface: "can0"
    node_id: "2"
    gear_ratio_numerator: 10000    # ⚙️ 0x6091 sub1: Gear Ratio Numerator (Motor shaft revolutions)
    gear_ratio_denominator: 1    # ⚙️ 0x6091 sub2: Gear Ratio Denominator (Driving shaft revolutions)
    max_profile_velocity: 40.0    # 📌 0x607F: Max profile velocity limit [r/s] (output shaft revolutions/s)
    profile_velocity: 30.0    # 🏃 Default profile velocity   [r/s]
    profile_acceleration: 30.0    # ⬆️ Default profile acceleration [r/s²]
    profile_deceleration: 30.0    # ⬇️ Default profile deceleration [r/s²]
    quick_stop_deceleration: 600.0    # 🛑 0x6085: Quick stop deceleration [r/s²]
    position_range_limit_max: 2147483647
    position_range_limit_min: -2147483648

# ---------------------------------------------------------------------------
# 🔄 Node 3 – Slewing joint
# ---------------------------------------------------------------------------
/slewing/canopen_ros2_node3:
  ros__parameters:
    can_interface: "can0"
    node_id: "3"
    gear_ratio_numerator: 10000    # ⚙️ 0x6091 sub1: Gear Ratio Numerator (Motor shaft revolutions)
    gear_ratio_denominator: 1    # ⚙️ 0x6091 sub2: Gear Ratio Denominator (Driving shaft revolutions)
    max_profile_velocity:  40.0    # 📌 0x607F [r/s]
    profile_velocity: 30.0    # 🏃 [r/s]
    profile_acceleration: 30.0    # ⬆️ [r/s²]
    profile_deceleration: 30.0    # ⬇️ [r/s²]
    quick_stop_deceleration: 600.0    # 🛑 [r/s²]
    position_range_limit_max: 2147483647
    position_range_limit_min: -2147483648